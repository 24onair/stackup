<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<!--
  CHROMA STACK — 팬톤 컬러칩 물리 스태킹 프로토타입
  실행: 이 폴더에서 `python3 -m http.server 8765` 후 http://localhost:8765 접속
  (ES 모듈을 사용하므로 file:// 직접 열기는 동작하지 않음)
  디버그: ?noads 파라미터로 광고 스텁 비활성화
-->
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
<title>CHROMA STACK</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  html, body {
    height: 100%;
    background: #101014;
    overflow: hidden;
    font-family: -apple-system, BlinkMacSystemFont, "Noto Sans KR", sans-serif;
    -webkit-user-select: none; user-select: none;
    -webkit-tap-highlight-color: transparent;
  }
  body { display: flex; align-items: center; justify-content: center; }
  #wrap { position: relative; }
  #game { display: block; touch-action: none; }

  .overlay {
    position: absolute; inset: 0;
    display: none;
    flex-direction: column; align-items: center; justify-content: center;
    gap: 14px; text-align: center;
    background: rgba(16, 16, 20, 0.35);
    backdrop-filter: blur(6px); -webkit-backdrop-filter: blur(6px);
  }
  .overlay h1 { font-size: 46px; font-weight: 800; letter-spacing: 4px; color: #fff; text-shadow: 0 2px 18px rgba(0,0,0,.25); }
  .overlay .sub { font-size: 15px; color: rgba(255,255,255,.85); letter-spacing: 1px; }
  .overlay .stat { font-size: 17px; color: rgba(255,255,255,.9); min-height: 22px; }
  .overlay .big { font-size: 64px; font-weight: 800; color: #fff; line-height: 1.1; }

  button {
    font: inherit; font-weight: 700; font-size: 19px;
    padding: 15px 44px; border: none; border-radius: 999px;
    cursor: pointer; letter-spacing: 1px;
    color: #1c1c22; background: #fff;
    box-shadow: 0 6px 22px rgba(0,0,0,.25);
    transition: transform .08s;
  }
  button:active { transform: scale(.95); }
  #btnContinue { background: #E8B93E; }

  button.ghost {
    background: rgba(255,255,255,.18); color: #fff;
    font-size: 16px; padding: 10px 30px; box-shadow: none;
    border: 1px solid rgba(255,255,255,.4);
  }

  #nickRow { display: none; gap: 8px; align-items: center; }
  #nickRow input {
    font: inherit; font-size: 16px; width: 170px;
    padding: 11px 16px; border: none; border-radius: 999px;
    text-align: center; outline: none;
  }
  #nickRow button { font-size: 16px; padding: 11px 22px; background: #E8B93E; }

  #boardTabs { display: flex; gap: 8px; }
  #boardTabs .tab {
    font-size: 15px; padding: 8px 16px; box-shadow: none;
    white-space: nowrap; flex-shrink: 0;
    background: rgba(255,255,255,.18); color: rgba(255,255,255,.8);
    border: 1px solid rgba(255,255,255,.3);
  }
  #boardTabs .tab.active { background: #fff; color: #1c1c22; }

  #boardList {
    width: 86%; max-width: 420px; height: 46%;
    overflow-y: auto; border-radius: 14px;
    background: rgba(0,0,0,.25); padding: 8px 0;
  }
  .board-row {
    display: flex; align-items: center; gap: 8px;
    padding: 9px 12px; color: #fff; font-size: 15px;
  }
  .board-row .rank { flex: 0 0 30px; text-align: right; font-weight: 800; opacity: .75; }
  /* 닉네임이 최우선으로 보이도록: 다른 컬럼은 축소 금지, 닉네임만 말줄임 */
  .board-row .nick { flex: 1 1 auto; min-width: 0; text-align: left; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
  .board-row .pts  { flex: 0 0 auto; font-weight: 700; }
  .board-row .ht   { flex: 0 0 auto; text-align: right; font-size: 11px; opacity: .6; }
  .board-row.me { background: rgba(232,185,62,.25); border-left: 3px solid #E8B93E; }
  .board-msg { color: rgba(255,255,255,.75); padding: 30px 0; font-size: 15px; }

  #btnSound {
    position: absolute; top: 10px; right: 10px; z-index: 10;
    width: 44px; height: 44px; padding: 0;
    font-size: 20px; line-height: 44px;
    background: rgba(255,255,255,.35); box-shadow: none;
    backdrop-filter: blur(4px); -webkit-backdrop-filter: blur(4px);
  }

  /* 광고 스텁 오버레이 (ads.js가 body에 생성) */
  #adOverlay {
    position: fixed; inset: 0; z-index: 50;
    display: none; align-items: center; justify-content: center;
    background: rgba(10, 10, 12, 0.92);
  }
  #adOverlay .ad-box { width: 300px; text-align: center; color: #fff; }
  #adOverlay .ad-label {
    display: inline-block; font-size: 12px; font-weight: 800; letter-spacing: 2px;
    border: 1px solid rgba(255,255,255,.5); border-radius: 4px;
    padding: 3px 10px; margin-bottom: 16px; color: rgba(255,255,255,.7);
  }
  #adOverlay .ad-text { font-size: 17px; margin-bottom: 18px; letter-spacing: 1px; }
  #adOverlay .ad-bar { height: 6px; border-radius: 3px; background: rgba(255,255,255,.15); overflow: hidden; }
  #adOverlay .ad-bar-fill { height: 100%; width: 0; background: #E8B93E; }
</style>
</head>
<body>
  <div id="wrap">
    <canvas id="game"></canvas>
    <button id="btnSound" aria-label="배경음악 켜기/끄기">🔊</button>

    <div id="title" class="overlay">
      <h1>CHROMA STACK</h1>
      <div class="sub">한 번의 탭으로 컬러칩을 쌓아 올리세요</div>
      <div id="titleBest" class="stat"></div>
      <div id="titleStreak" class="stat"></div>
      <button id="btnStart">시작하기</button>
      <button id="btnBoardTitle" class="ghost">🏆 랭킹</button>
    </div>

    <div id="result" class="overlay">
      <div id="resultReason" class="sub"></div>
      <div id="resultScore" class="big">0</div>
      <div id="resultHeight" class="stat"></div>
      <div id="resultBest" class="stat"></div>
      <div id="nickRow">
        <input id="nickInput" maxlength="12" placeholder="닉네임 (2~12자)" autocomplete="off">
        <button id="btnNickSave">등록</button>
      </div>
      <button id="btnContinue">📺 광고 보고 이어하기</button>
      <button id="btnRestart">다시하기</button>
      <button id="btnBoard" class="ghost">🏆 랭킹</button>
    </div>

    <div id="board" class="overlay">
      <h1 style="font-size:30px">🏆 랭킹</h1>
      <div id="boardTabs">
        <button class="tab active" data-range="all">전체</button>
        <button class="tab" data-range="day">일간</button>
        <button class="tab" data-range="week">주간</button>
      </div>
      <div id="boardList"></div>
      <button id="btnBoardClose" class="ghost">닫기</button>
    </div>
  </div>

  <script src="https://cdnjs.cloudflare.com/ajax/libs/matter-js/0.20.0/matter.min.js"></script>
  <script type="module" src="js/main.js"></script>
</body>
</html>
