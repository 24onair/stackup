  "gamePlatform": "Web Browser",

<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Rammetto+One&family=Jua&family=IBM+Plex+Sans+KR:wght@400;500;700&family=IBM+Plex+Mono:wght@500&display=swap" rel="stylesheet">
<style>
  /* ── 칩칩 디자인 토큰: PAPER #F3E9D7 · INK #33261A · CREAM #FBF4E6
       하드섀도(블러 금지) · 외곽선 2–3px INK · 라운드 금지 · 오렌지 CTA는 화면당 1곳 ── */
  * { margin: 0; padding: 0; box-sizing: border-box; }
  html, body {
    height: 100%;
    background: #33261A; /* 레터박스 = INK */
    overflow: hidden;
    font-family: 'IBM Plex Sans KR', -apple-system, sans-serif;
    color: #33261A;
    -webkit-user-select: none; user-select: none;
    -webkit-tap-highlight-color: transparent;
  }
  body { position: fixed; inset: 0; display: flex; align-items: center; justify-content: center; }
  #wrap { position: relative; overflow: hidden; }
  #game { display: block; touch-action: none; }

  .overlay {
    position: absolute; inset: 0; z-index: 20;
    display: none;
    flex-direction: column; align-items: center; justify-content: center;
    gap: 16px; text-align: center;
    background: #F3E9D7;
    overflow: hidden;
  }
  /* 타이틀은 세로가 좁으면(포털 임베드) 잘리지 않게 스크롤 — safe center로 상단 클리핑 방지 */
  #title { overflow-y: auto; justify-content: safe center; }

  /* 5색 상단 띠 (커버 모티프) */
  .strip5 { position: absolute; top: 0; left: 0; right: 0; height: 12px; display: flex; }
  .strip5 i { flex: 1; }
  .strip5 i:nth-child(1) { background: #E4572E; }
  .strip5 i:nth-child(2) { background: #EDAA3C; }
  .strip5 i:nth-child(3) { background: #6E7F3C; }
  .strip5 i:nth-child(4) { background: #1F7A72; }
  .strip5 i:nth-child(5) { background: #A93B2A; }

  /* ── 버튼 (스티커) ── */
  button, .btn {
    font-family: 'Jua', sans-serif; font-size: 19px;
    color: #33261A; background: #FBF4E6;
    border: 3px solid #33261A; border-radius: 0;
    box-shadow: 4px 4px 0 #33261A;
    padding: 12px 30px; cursor: pointer; letter-spacing: 0.5px;
  }
  button:active { transform: translate(2px, 2px); box-shadow: 2px 2px 0 #33261A; }
  .btn-big { font-size: 24px; padding: 16px 52px; }
  .btn-teal { background: #1F7A72; color: #FBF4E6; }
  .btn-mustard { background: #EDAA3C; color: #33261A; }
  .btn-half { flex: 1; font-size: 17px; padding: 12px 8px; }
  #btnDouble { background: #E86A2C; color: #FBF4E6; font-size: 20px; }
  #btnRevive { background: #1F7A72; color: #FBF4E6; font-size: 20px; animation: dblPulse 1.3s ease-in-out infinite; }
  #btnRevive:active { animation: none; }
  @keyframes dblPulse { 0%, 100% { transform: translateY(0); } 50% { transform: translateY(-3px); } }
  #resultScore.pop { animation: scorePop 0.45s ease-out; }
  @keyframes scorePop { 0% { transform: scale(1); } 40% { transform: scale(1.28); color: #E86A2C; } 100% { transform: scale(1); } }

  /* ── 타이틀 (로고 락업) ── */
  .logo-chips { display: flex; align-items: flex-end; margin-bottom: 4px; }
  .logo-chips i { width: 44px; height: 28px; border: 3px solid #33261A; display: block; }
  .logo-chips i:nth-child(1) { background: #1F7A72; }
  .logo-chips i:nth-child(2) { background: #EDAA3C; margin-left: -28px; margin-bottom: 30px; }
  .logo-chips i:nth-child(3) { background: #E4572E; margin-left: -30px; margin-bottom: 60px; }
  .logo-en {
    font-family: 'Rammetto One', cursive; font-size: 54px; line-height: 1.05;
    color: #E4572E; text-shadow: 4px 4px 0 #33261A;
  }
  .logo-kr { font-family: 'Jua', sans-serif; font-size: 28px; }
  .tagline { font-size: 15px; font-weight: 500; color: #6b5947; }
  .stat-badge {
    font-family: 'Jua', sans-serif; font-size: 16px; min-height: 20px;
    color: #33261A;
  }
  .stat-badge:empty { display: none; }

  /* ── 도시(스테이지) 선택기 ── */
  .city-label { font-family: 'Jua', sans-serif; font-size: 15px; color: #55452F; margin-top: 4px; }
  #citySelect {
    display: flex; gap: 10px; overflow-x: auto; max-width: 94%;
    padding: 4px 4px 10px; -webkit-overflow-scrolling: touch;
    flex-shrink: 0; /* 세로가 좁은 포털 임베드(GameMonetize 등)에서 플렉스 압축으로 카드가 뭉개지는 것 방지 */
  }
  .city-card {
    flex: 0 0 auto; padding: 0; border: 3px solid #33261A; border-radius: 0;
    background: #FBF4E6; box-shadow: 3px 3px 0 #33261A;
    display: flex; flex-direction: column; align-items: stretch; overflow: hidden;
  }
  .city-card.sel { border-color: #E4572E; box-shadow: 3px 3px 0 #E4572E; }
  .city-card:active { transform: translate(2px, 2px); box-shadow: 1px 1px 0 #33261A; }
  .city-thumb {
    width: 104px; height: 116px; display: block;
    background-repeat: no-repeat; background-size: 104px auto;
    background-position: 0 -200px;                    /* 스카이라인 상징 건물 + 강 밴드로 크롭 */
    image-rendering: pixelated; image-rendering: crisp-edges;
    border-bottom: 3px solid #33261A;
  }
  .city-name {
    font-family: 'Jua', sans-serif; font-size: 15px; color: #33261A;
    padding: 5px 0; text-align: center;
  }
  .city-card.sel .city-name { color: #E4572E; }

  /* ── 결과 화면 (오렌지 풀블리드 + 결과칩 카드) ── */
  #result { background: #E4572E; gap: 14px; }
  .r-title {
    font-family: 'Jua', sans-serif; font-size: 36px; color: #FBF4E6;
    text-shadow: 3px 3px 0 #33261A;
  }
  .r-chip {
    width: 240px; border: 3px solid #33261A; box-shadow: 6px 6px 0 #33261A;
    display: flex; flex-direction: column; background: #FBF4E6;
  }
  .r-face {
    background: #EDAA3C; min-height: 160px;
    display: flex; flex-direction: column; align-items: center; justify-content: center; gap: 0;
  }
  #resultScore { font-family: 'Rammetto One', cursive; font-size: 68px; line-height: 1.1; color: #33261A; }
  .r-face-sub { font-family: 'Jua', sans-serif; font-size: 18px; color: #33261A; }
  .r-label {
    border-top: 3px solid #33261A; padding: 10px 14px; text-align: left;
    display: flex; flex-direction: column; gap: 2px;
  }
  #resultCode { font-family: 'IBM Plex Mono', monospace; font-size: 12px; font-weight: 500; }
  #resultMeta { font-family: 'Jua', sans-serif; font-size: 14px; color: #55452F; }
  .r-stats { display: flex; gap: 14px; }
  .r-stat {
    background: #FBF4E6; border: 2px solid #33261A; box-shadow: 3px 3px 0 #33261A;
    padding: 8px 18px; display: flex; flex-direction: column; min-width: 92px;
  }
  .r-stat b { font-family: 'Rammetto One', cursive; font-size: 20px; font-weight: 400; }
  .r-stat label { font-family: 'Jua', sans-serif; font-size: 12px; color: #6b5947; }
  .r-ctas { display: flex; flex-direction: column; gap: 12px; width: 76%; max-width: 340px; }
  .r-ctas .btn-big { width: 100%; padding: 15px 0; }
  .r-row { display: flex; gap: 12px; }

  /* 진입 모션: 결과 칩 "툭" 낙하 + 버튼 순차 슬라이드 업 */
  #result.show .r-chip { animation: chipDropIn 0.45s cubic-bezier(.3,1.4,.5,1) both; }
  #result.show .r-stats { animation: slideUp 0.3s 0.25s both; }
  #result.show .r-ctas  { animation: slideUp 0.3s 0.4s both; }
  @keyframes chipDropIn { from { transform: translateY(-140%); } to { transform: translateY(0); } }
  @keyframes slideUp { from { transform: translateY(28px); opacity: 0; } to { transform: translateY(0); opacity: 1; } }

  #nickRow { display: none; gap: 8px; align-items: center; }
  #nickRow input {
    font-family: 'Jua', sans-serif; font-size: 16px; width: 170px;
    padding: 11px 16px; border: 2px solid #33261A; border-radius: 0;
    background: #FBF4E6; color: #33261A; text-align: center; outline: none;
  }
  #nickRow button { font-size: 16px; padding: 11px 20px; background: #EDAA3C; box-shadow: 3px 3px 0 #33261A; }

  /* ── 랭킹 화면 ── */
  #board { justify-content: flex-start; padding: 5% 6% 4%; gap: 12px; }
  .board-head { display: flex; align-items: center; width: 100%; }
  .board-head h2 { font-family: 'Jua', sans-serif; font-size: 26px; font-weight: 400; flex: 1; }
  #btnBoardClose {
    width: 44px; height: 44px; padding: 0;
    font-family: 'Rammetto One', cursive; font-size: 17px;
    border-width: 2px; box-shadow: 3px 3px 0 #33261A;
  }
  .board-spacer { width: 44px; }
  #boardTabs { display: flex; width: 100%; border: 2px solid #33261A; background: #FBF4E6; }
  #boardTabs .tab {
    flex: 1; padding: 10px 0; border: none; border-radius: 0; box-shadow: none;
    font-family: 'Jua', sans-serif; font-size: 15px; background: #FBF4E6; color: #33261A;
  }
  #boardTabs .tab + .tab { border-left: 2px solid #33261A; }
  #boardTabs .tab.active { background: #E4572E; color: #FBF4E6; }
  #boardTabs .tab:active { transform: none; }

  #podium { display: flex; align-items: flex-end; justify-content: center; gap: 10px; min-height: 0; }
  .pod { display: flex; flex-direction: column; border: 3px solid #33261A; box-shadow: 3px 3px 0 #33261A; width: 104px; }
  .pod.p1 { width: 114px; box-shadow: 4px 4px 0 #33261A; }
  .pod-face { display: flex; align-items: center; justify-content: center; position: relative; }
  .pod-face b { font-family: 'Rammetto One', cursive; font-weight: 400; }
  .pod-flag {
    position: absolute; top: -3px; left: 50%; transform: translateX(-50%);
    width: 0; height: 0;
    border-left: 9px solid transparent; border-right: 9px solid transparent;
    border-top: 12px solid #E4572E;
  }
  .pod-label { background: #FBF4E6; border-top: 3px solid #33261A; padding: 5px 7px; text-align: left; }
  .pod-label .nick { font-family: 'Jua', sans-serif; font-size: 12px; display: block; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
  .pod-label .code { font-family: 'IBM Plex Mono', monospace; font-size: 8.5px; color: #6b5947; white-space: nowrap; overflow: hidden; display: block; }

  #boardList { width: 100%; flex: 1; overflow-y: auto; display: flex; flex-direction: column; gap: 8px; }
  .board-row {
    background: #FBF4E6; border: 2px solid #33261A;
    display: flex; align-items: center; gap: 10px; padding: 9px 12px;
  }
  .board-row .rank { width: 30px; font-family: 'Rammetto One', cursive; font-size: 14px; color: #6b5947; text-align: right; flex-shrink: 0; }
  .board-row .swatch { width: 20px; height: 14px; border: 2px solid #33261A; flex-shrink: 0; }
  .board-row .nick { font-family: 'Jua', sans-serif; font-size: 15px; flex: 1 1 auto; min-width: 0; text-align: left; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
  .board-row .pts { font-family: 'IBM Plex Mono', monospace; font-size: 12px; font-weight: 500; color: #55452F; flex-shrink: 0; }
  .board-msg { font-family: 'Jua', sans-serif; color: #6b5947; padding: 30px 0; font-size: 15px; }
  #myRow { width: 100%; }
  #myRow .board-row { border: 3px solid #E4572E; box-shadow: 4px 4px 0 #33261A; padding: 12px 14px; }
  #myRow .rank { color: #E4572E; }
  #myRow:empty { display: none; }
  /* 내 순위 행 착지 스쿼시 — 랭킹 진입 시 재생 (가이드) */
  #myRow .board-row { animation: rowLand 0.35s cubic-bezier(.3,1.2,.5,1); }
  @keyframes rowLand {
    0%   { transform: translateY(-16px) scale(1.04, 0.82); }
    60%  { transform: translateY(0)     scale(0.98, 1.06); }
    100% { transform: none; }
  }

  /* ── 리그 화면 ── */
  #leagues, #leagueBoard { justify-content: flex-start; padding: 5% 6% 4%; gap: 12px; }
  #leaguesList, #leagueList { width: 100%; flex: 1; overflow-y: auto; display: flex; flex-direction: column; gap: 8px; }
  #leaguePodium { display: flex; align-items: flex-end; justify-content: center; gap: 10px; min-height: 0; }
  #leaguePodium:empty { display: none; }
  #leagueMyRow { width: 100%; }
  #leagueMyRow .board-row { border: 3px solid #E4572E; box-shadow: 4px 4px 0 #33261A; padding: 12px 14px; }
  #leagueMyRow .rank { color: #E4572E; }
  #leagueMyRow:empty { display: none; }

  /* 리그 카드 */
  .league-card {
    width: 100%; text-align: left; background: #FBF4E6; border: 2px solid #33261A;
    box-shadow: 3px 3px 0 #33261A; border-radius: 0; padding: 12px 14px;
    display: flex; flex-direction: column; gap: 5px; cursor: pointer;
  }
  .league-card:active { transform: translate(1px, 1px); box-shadow: 2px 2px 0 #33261A; }
  .lc-top { display: flex; align-items: center; gap: 8px; }
  .lc-name { font-family: 'Jua', sans-serif; font-size: 17px; color: #33261A; flex: 1 1 auto; min-width: 0; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
  .lc-owner { font-family: 'Jua', sans-serif; font-size: 11px; color: #FBF4E6; background: #2F8F83; padding: 2px 7px; flex-shrink: 0; }
  .lc-meta { font-family: 'IBM Plex Mono', monospace; font-size: 12px; color: #6b5947; }
  .lc-event { font-family: 'Jua', sans-serif; font-size: 12.5px; color: #55452F; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }

  /* 생성/참가 폼 */
  .league-forms { width: 100%; display: flex; flex-direction: column; gap: 8px; }
  .lf-row { display: flex; gap: 8px; }
  .lf-row input {
    font-family: 'Jua', sans-serif; font-size: 15px; flex: 1 1 auto; min-width: 0;
    padding: 11px 14px; border: 2px solid #33261A; border-radius: 0;
    background: #FBF4E6; color: #33261A; outline: none;
  }
  #leagueCodeInput { text-transform: uppercase; letter-spacing: 2px; font-family: 'IBM Plex Mono', monospace; }
  .lf-row button { font-size: 15px; padding: 11px 16px; background: #EDAA3C; box-shadow: 3px 3px 0 #33261A; flex-shrink: 0; }

  /* 초대 코드 행 */
  .league-code-row { display: flex; align-items: center; gap: 10px; width: 100%; background: #FBF4E6; border: 2px solid #33261A; padding: 8px 12px; }
  .lcr-label { font-family: 'Jua', sans-serif; font-size: 13px; color: #6b5947; flex-shrink: 0; }
  #leagueCodeLabel { font-family: 'IBM Plex Mono', monospace; font-size: 20px; letter-spacing: 3px; color: #33261A; flex: 1; }
  .league-code-row #btnInvite { font-size: 13px; padding: 8px 14px; flex-shrink: 0; }

  /* 이벤트 배너 */
  #leagueEvent { width: 100%; display: flex; flex-direction: column; gap: 8px; }
  #leagueEventInfo { font-family: 'Jua', sans-serif; font-size: 14px; color: #33261A; background: #FBF4E6; border: 2px dashed #33261A; padding: 10px 12px; text-align: center; }
  #eventForm { display: flex; flex-direction: column; gap: 8px; }
  #eventForm input, #eventForm select {
    font-family: 'Jua', sans-serif; font-size: 15px; padding: 10px 12px;
    border: 2px solid #33261A; border-radius: 0; background: #FBF4E6; color: #33261A; outline: none;
  }
  .ef-row { display: flex; gap: 8px; }
  .ef-row select { flex-shrink: 0; }
  .ef-row button { flex: 1; font-size: 15px; padding: 10px 14px; background: #E4572E; color: #FBF4E6; box-shadow: 3px 3px 0 #33261A; }
  #btnStartEvent { width: 100%; font-size: 15px; padding: 11px 0; background: #E4572E; color: #FBF4E6; box-shadow: 3px 3px 0 #33261A; }

  /* 리그 탭 */
  #leagueTabs { display: flex; width: 100%; border: 2px solid #33261A; background: #FBF4E6; }
  #leagueTabs .ltab {
    flex: 1; padding: 9px 0; border: none; border-radius: 0; box-shadow: none;
    font-family: 'Jua', sans-serif; font-size: 14px; background: #FBF4E6; color: #33261A;
  }
  #leagueTabs .ltab + .ltab { border-left: 2px solid #33261A; }
  #leagueTabs .ltab.active { background: #E4572E; color: #FBF4E6; }
  #leagueTabs .ltab:active { transform: none; }
  #btnLeagueLeave { width: 100%; font-size: 13px; padding: 9px 0; }

  #btnLeaguesClose, #btnLeagueBoardBack {
    width: 44px; height: 44px; padding: 0;
    font-family: 'Rammetto One', cursive; font-size: 17px;
    border-width: 2px; box-shadow: 3px 3px 0 #33261A;
  }

  /* ── 화면 전환: 5색 칩 띠 와이프 (아래→위) ── */
  #wipe {
    position: absolute; inset: 0; z-index: 40; pointer-events: none;
    display: flex; flex-direction: column;
    transform: translateY(100%);
  }
  #wipe.in  { transform: translateY(0); transition: transform 0.2s ease-in; }
  #wipe.out { transform: translateY(-100%); transition: transform 0.2s ease-out; }
  #wipe i { flex: 1; border-top: 3px solid #33261A; }
  #wipe i:nth-child(1) { background: #A93B2A; }
  #wipe i:nth-child(2) { background: #1F7A72; }
  #wipe i:nth-child(3) { background: #6E7F3C; }
  #wipe i:nth-child(4) { background: #EDAA3C; }
  #wipe i:nth-child(5) { background: #E4572E; }

  /* ── 사운드 버튼 (스티커) ── */
  #btnSound {
    position: absolute; top: 6.5%; right: 12px; z-index: 30; /* 오버레이(20) 위, 와이프(40) 아래 */
    width: 44px; height: 44px; padding: 0;
    font-size: 19px; line-height: 40px;
    border-width: 2px; box-shadow: 3px 3px 0 #33261A;
  }
  /* ── 언어 토글 (좌상단, 사운드 버튼 대칭) ── */
  #btnLang {
    position: absolute; top: 6.5%; left: 12px; z-index: 30;
    height: 44px; min-width: 44px; padding: 0 12px;
    font-size: 16px; line-height: 40px;
    border-width: 2px; box-shadow: 3px 3px 0 #33261A;
  }

  /* 랭킹 보드 열림 중엔 전역 버튼 숨김 (보드 자체 닫기 버튼과 겹침 방지) */
  body.board-open #btnLang, body.board-open #btnSound { display: none; }

  .title-foot {
    margin-top: 16px; max-width: 88%;
    font-family: 'IBM Plex Sans KR', sans-serif; font-size: 12px; line-height: 1.5; color: #6b5947;
  }
  .title-foot .blurb { margin-bottom: 8px; }
  .title-links { display: flex; flex-wrap: wrap; gap: 6px 14px; justify-content: center; }
  .title-links a {
    font-family: 'Jua', sans-serif; font-size: 12px; letter-spacing: .3px;
    color: #8a7860; text-decoration: none; border-bottom: 1px solid rgba(138,120,96,.4);
  }
  .title-links a:hover { color: #55452F; }

  /* ── 광고 스텁 오버레이 (ads.js가 body에 생성) ── */
  #adOverlay {
    position: fixed; inset: 0; z-index: 50;
    display: none; align-items: center; justify-content: center;
    background: rgba(51, 38, 26, 0.94);
  }
  #adOverlay .ad-box { width: 300px; text-align: center; color: #FBF4E6; }
  #adOverlay .ad-label {
    display: inline-block; font-family: 'Rammetto One', cursive; font-size: 12px; letter-spacing: 2px;
    border: 2px solid #FBF4E6; padding: 3px 10px; margin-bottom: 16px; color: #FBF4E6;
  }
  #adOverlay .ad-text { font-family: 'Jua', sans-serif; font-size: 17px; margin-bottom: 18px; letter-spacing: 1px; }
  #adOverlay .ad-bar { height: 8px; background: rgba(251,244,230,.2); border: 1px solid #FBF4E6; overflow: hidden; }
  #adOverlay .ad-bar-fill { height: 100%; width: 0; background: #EDAA3C; }
  /* 광고 로딩(포털 광고는 로드에 수 초 걸림) — 진행률 대신 무한 슬라이드 바 */
  #adOverlay.loading .ad-bar-fill { width: 40%; animation: adLoadSlide 1.1s ease-in-out infinite; }
  @keyframes adLoadSlide { 0% { transform: translateX(-110%); } 100% { transform: translateX(260%); } }
</style>
</head>
<body>
  <div id="wrap">
    <canvas id="game"></canvas>
    <button id="btnSound" data-i18n-aria="sound_toggle" aria-label="사운드 켜기/끄기">🔊</button>
    <button id="btnLang" data-i18n="lang_switch">EN</button>

    <!-- 타이틀 -->
    <div id="title" class="overlay">
      <div class="strip5"><i></i><i></i><i></i><i></i><i></i></div>
      <div class="logo-chips"><i></i><i></i><i></i></div>
      <div>
        <div class="logo-en">CHIP! CHIP!</div>
        <div class="logo-kr">칩칩!</div>
      </div>
      <div class="tagline" data-i18n="tagline">한 번의 터치로 쌓는 컬러의 탑</div>
      <div id="titleBest" class="stat-badge"></div>
      <div id="titleStreak" class="stat-badge"></div>
      <div class="city-label" data-i18n="city_prompt">어느 도시에 쌓을까요?</div>
      <div id="citySelect"></div>
      <button id="btnStart" class="btn-big" data-i18n="play">쌓아 볼까?</button>
      <button id="btnBoardTitle" class="btn-teal" data-i18n="ranking">🏆 랭킹</button>
      <button id="btnLeaguesTitle" class="btn-teal" data-i18n="leagues" style="display:none">🏘️ 리그</button>
      <div class="title-foot">
        <p class="blurb" data-i18n="home_blurb">한 번의 터치로 컬러 칩을 쌓는 실물리 스태킹 게임. 서울·문경·파리·도쿄 등 8개 도시의 스카이라인을 성층권까지 등반하세요. 무료 · 설치 불필요.</p>
        <nav class="title-links">
          <a href="how-to-play.html" data-i18n="how_to_play">게임 방법</a>
          <a href="about.html" data-i18n="about">소개</a>
          <a href="privacy.html" data-i18n="privacy">개인정보처리방침</a>
        </nav>
      </div>
    </div>

    <!-- 결과 (와르르...!) -->
    <div id="result" class="overlay">
      <div class="r-title" data-i18n="crash">와르르...!</div>
      <div class="r-chip">
        <div class="r-face">
          <div id="resultScore">0</div>
          <div class="r-face-sub" data-i18n="points_collected">점을 모았어요</div>
        </div>
        <div class="r-label">
          <div id="resultCode">CC 000-C</div>
          <div id="resultMeta">서울 · 0칩</div>
        </div>
      </div>
      <div class="r-stats">
        <div class="r-stat"><b id="statPerfect">0</b><label data-i18n="perfect">퍼펙트</label></div>
        <div class="r-stat"><b id="statCombo">x0</b><label data-i18n="max_combo">최다 콤보</label></div>
      </div>
      <div id="nickRow">
        <input id="nickInput" maxlength="12" data-i18n-ph="nick_ph" placeholder="닉네임 (2~12자)" autocomplete="off">
        <button id="btnNickSave" data-i18n="save">등록</button>
      </div>
      <div class="r-ctas">
        <button id="btnRevive" class="btn-big" data-i18n="revive">❤️ 광고 보고 이어하기</button>
        <button id="btnDouble" class="btn-big" data-i18n="double">🎬 광고 보고 점수 2배</button>
        <button id="btnRestart" class="btn-big" data-i18n="play_again">다시 쌓기</button>
        <div class="r-row">
          <button id="btnShare" class="btn-teal btn-half" data-i18n="share">기록 공유</button>
          <button id="btnBoard" class="btn-half" data-i18n="ranking">🏆 랭킹</button>
          <button id="btnHome" class="btn-mustard btn-half" data-i18n="home">홈으로</button>
        </div>
      </div>
    </div>

    <!-- 랭킹 -->
    <div id="board" class="overlay">
      <div class="board-head">
        <button id="btnBoardClose">&lt;</button>
        <h2 data-i18n="ranking_plain">랭킹</h2>
        <div class="board-spacer"></div>
      </div>
      <div id="boardTabs">
        <button class="tab active" data-range="day" data-i18n="today">오늘</button>
        <button class="tab" data-range="week" data-i18n="week">주간</button>
        <button class="tab" data-range="all" data-i18n="all">전체</button>
      </div>
      <div id="podium"></div>
      <div id="boardList"></div>
      <div id="myRow"></div>
    </div>

    <!-- 리그 목록 -->
    <div id="leagues" class="overlay">
      <div class="board-head">
        <button id="btnLeaguesClose">&lt;</button>
        <h2 data-i18n="leagues_title">리그</h2>
        <div class="board-spacer"></div>
      </div>
      <div id="leaguesList"></div>
      <div class="league-forms">
        <div class="lf-row">
          <input id="leagueNameInput" maxlength="24" data-i18n-ph="league_name_ph" placeholder="리그 이름" autocomplete="off">
          <button id="btnLeagueCreate" data-i18n="league_create_do">만들기</button>
        </div>
        <div class="lf-row">
          <input id="leagueCodeInput" maxlength="6" data-i18n-ph="league_code_ph" placeholder="초대 코드 6자" autocomplete="off" autocapitalize="characters">
          <button id="btnLeagueJoin" data-i18n="league_join_do">참가</button>
        </div>
      </div>
    </div>

    <!-- 리그 상세 순위판 -->
    <div id="leagueBoard" class="overlay">
      <div class="board-head">
        <button id="btnLeagueBoardBack">&lt;</button>
        <h2 id="leagueBoardName">리그</h2>
        <div class="board-spacer"></div>
      </div>
      <div class="league-code-row">
        <span class="lcr-label" data-i18n="code_label">초대 코드</span>
        <b id="leagueCodeLabel">------</b>
        <button id="btnInvite" class="btn-teal" data-i18n="invite">초대</button>
      </div>
      <div id="leagueEvent">
        <div id="leagueEventInfo"></div>
        <div id="eventForm" style="display:none">
          <input id="eventTitleInput" maxlength="40" data-i18n-ph="event_title_ph" placeholder="이벤트 제목" autocomplete="off">
          <div class="ef-row">
            <select id="eventDurSelect">
              <option value="1" data-i18n="event_dur_1d">1일</option>
              <option value="3" selected data-i18n="event_dur_3d">3일</option>
              <option value="7" data-i18n="event_dur_7d">7일</option>
            </select>
            <button id="btnEventGo" data-i18n="event_start">🎯 이벤트 시작</button>
          </div>
        </div>
        <button id="btnStartEvent" data-i18n="event_start" style="display:none">🎯 이벤트 시작</button>
      </div>
      <div id="leagueTabs">
        <button class="ltab active" data-lrange="event" data-i18n="event_tab">이벤트</button>
        <button class="ltab" data-lrange="day" data-i18n="today">오늘</button>
        <button class="ltab" data-lrange="week" data-i18n="week">주간</button>
        <button class="ltab" data-lrange="all" data-i18n="all">전체</button>
      </div>
      <div id="leaguePodium"></div>
      <div id="leagueList"></div>
      <div id="leagueMyRow"></div>
      <button id="btnLeagueLeave" class="btn-mustard" data-i18n="league_leave">리그 나가기</button>
    </div>

    <!-- 화면 전환 와이프 -->
    <div id="wipe"><i></i><i></i><i></i><i></i><i></i></div>
  </div>

  <script src="https://cdnjs.cloudflare.com/ajax/libs/matter-js/0.20.0/matter.min.js"></script>
  <script type="module" src="js/main.js"></script>
  <script>
    // PWA — 프로덕션 도메인에서만 등록 (로컬 개발·포털 임베드(itch/CrazyGames 등)에선 SW 캐시 미개입)
    if ('serviceWorker' in navigator
        && ['playchipchip.com', 'www.playchipchip.com'].includes(location.hostname)) {
      addEventListener('load', () => navigator.serviceWorker.register('sw.js'));
    }
  </script>
</body>
</html>
